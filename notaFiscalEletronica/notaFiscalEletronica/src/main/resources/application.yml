spring:
  application:
    name: notaFiscalEletronica

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5001}/${DB_NAME:nota_fiscal_java_db}
    username: ${DB_USERNAME:nfe_java_admin}
    password: ${DB_PASSWORD:+!6Y;A8UJ-kSy+wLr<lgv79G%r}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    fail-on-missing-locations: false
    out-of-order: false

api:
  security:
    token:
      secret: ${JWT_SECRET}
      
server:
  port: 5002



logging:
  level:
    root: INFO
    org.flywaydb: DEBUG
    org.springframework.orm.jpa: DEBUG

