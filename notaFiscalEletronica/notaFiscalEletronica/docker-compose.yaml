services:
   postgres:
    image: 'postgres:16-alpine'
    container_name: nfe_db
    environment:
      - 'POSTGRES_DB=${DB_NAME}'
      - 'POSTGRES_PASSWORD=${DB_PASSWORD}'
      - 'POSTGRES_USER=${DB_USERNAME}'
    ports:
      - '${DB_PORT}:5432'

    restart: always
    volumes:
    - pg_data_nfs:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    deploy:
      limits:
        cpus: '0.50'
        memory: 512M


